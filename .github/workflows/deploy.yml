name: Deploy a Hostinger (FTP)

# Despliega el sitio a Hostinger en cada push a main.
# Requiere configurar estos secretos en:
#   GitHub -> Settings -> Secrets and variables -> Actions
#     FTP_SERVER    -> host FTP de Hostinger (ej: ftp.cristianignacio.me o la IP)
#     FTP_USERNAME  -> usuario FTP (hPanel -> Archivos -> Cuentas FTP)
#     FTP_PASSWORD  -> contraseña de esa cuenta FTP
#     FTP_DIR       -> carpeta destino (normalmente: public_html/  )

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite lanzarlo a mano desde la pestaña Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Comprobar que los secretos FTP existen
        run: |
          missing=0
          for s in FTP_SERVER FTP_USERNAME FTP_PASSWORD FTP_DIR; do
            if [ -z "${!s}" ]; then echo "::error::Falta el secreto $s"; missing=1; fi
          done
          if [ "$missing" = "1" ]; then
            echo "::error::Configura los secretos en Settings -> Secrets and variables -> Actions"
            exit 1
          fi
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR: ${{ secrets.FTP_DIR }}

      - name: Subir por FTP a Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_DIR }}
          # No subir archivos internos del repo, solo el sitio:
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
            CONTRIBUTING.md
            CNAME

      # Verifica que el sitio realmente quedó publicado (no solo que subió).
      # Opcional: solo corre si defines la variable PUBLIC_URL en
      #   Settings -> Secrets and variables -> Actions -> Variables
      #   (ej. https://cristianignacio.me). Útil tras propagar el DNS.
      - name: Verificar publicación en vivo
        if: ${{ vars.PUBLIC_URL != '' }}
        run: |
          url="${{ vars.PUBLIC_URL }}"
          echo "Comprobando $url ..."
          # Reintenta hasta 5 veces por si el servidor tarda en refrescar.
          for i in 1 2 3 4 5; do
            body="$(curl -fsSL --max-time 20 "$url" || true)"
            if echo "$body" | grep -q "Claude desde Cero"; then
              echo "✅ Publicado: el sitio responde y contiene el contenido esperado."
              exit 0
            fi
            echo "Intento $i sin éxito, reintentando en 10s..."
            sleep 10
          done
          echo "::error::El sitio no devolvió el contenido esperado en $url"
          exit 1
