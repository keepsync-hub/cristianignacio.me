name: Deploy a Hostinger (SSH)

# Publica el sitio en Hostinger por rsync sobre SSH (clave pública/privada).
# Es más seguro que FTP: la clave privada nunca sale de GitHub y se puede revocar.
#
# Secretos a configurar en:
#   GitHub -> Settings -> Secrets and variables -> Actions -> New repository secret
#     SSH_PRIVATE_KEY -> contenido COMPLETO de la clave privada (deploy_key)
#                        incluyendo las líneas BEGIN/END
#     SSH_HOST        -> host/IP del servidor (hPanel -> Avanzado -> Acceso SSH)
#     SSH_USER        -> usuario SSH (ej: u123456789)
#     SSH_PORT        -> puerto SSH de Hostinger (normalmente 65002)
#     SSH_TARGET      -> carpeta destino (ej: /home/u123456789/public_html)
#
# Variable opcional (pestaña Variables):
#     PUBLIC_URL      -> https://cristianignacio.me  (para verificar la publicación)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Comprobar que los secretos SSH existen
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_TARGET: ${{ secrets.SSH_TARGET }}
        run: |
          missing=0
          for s in SSH_PRIVATE_KEY SSH_HOST SSH_USER SSH_PORT SSH_TARGET; do
            if [ -z "${!s}" ]; then echo "::error::Falta el secreto $s"; missing=1; fi
          done
          if [ "$missing" = "1" ]; then
            echo "::error::Configura los secretos en Settings -> Secrets and variables -> Actions"
            exit 1
          fi

      - name: Preparar la clave SSH privada
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Guarda la huella del servidor para evitar el aviso de "host desconocido"
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Publicar con rsync sobre SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_TARGET: ${{ secrets.SSH_TARGET }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='README.md' \
            --exclude='CONTRIBUTING.md' \
            --exclude='CNAME' \
            ./ "$SSH_USER@$SSH_HOST:$SSH_TARGET"

      - name: Borrar la clave del runner
        if: always()
        run: rm -f ~/.ssh/deploy_key

      # Verifica que el sitio realmente quedó publicado (no solo que subió).
      # Solo corre si defines la variable PUBLIC_URL.
      - name: Verificar publicación en vivo
        if: ${{ vars.PUBLIC_URL != '' }}
        run: |
          url="${{ vars.PUBLIC_URL }}"
          echo "Comprobando $url ..."
          for i in 1 2 3 4 5; do
            body="$(curl -fsSL --max-time 20 "$url" || true)"
            if echo "$body" | grep -q "Claude desde Cero"; then
              echo "✅ Publicado: el sitio responde y contiene el contenido esperado."
              exit 0
            fi
            echo "Intento $i sin éxito, reintentando en 10s..."
            sleep 10
          done
          echo "::error::El sitio no devolvió el contenido esperado en $url"
          exit 1
